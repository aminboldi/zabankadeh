services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: zabankadeh
      POSTGRES_USER: zabankadeh
      POSTGRES_PASSWORD: zabankadeh
    ports:
      - "5433:5432"
    volumes:
      - zabankadeh_pg:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zabankadeh"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  zabankadeh_pg:
